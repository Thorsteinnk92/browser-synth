<body>
  <h1>Synth</h1>
  <div>
  <label>Waveform: </label>
  <select id="waveform">
    <option value="sawtooth">Sawtooth</option>
    <option value="square">Square</option>
    <option value="sine">Sine</option>
    <option value="triangle">Triangle</option>
  </select>
</div>
<div>
  <label>Attack: <input type="range" id="attack" min="0.001" max="1" step="0.001" value="0.01"></label>
  <label>Decay: <input type="range" id="decay" min="0.001" max="1" step="0.001" value="0.1"></label>
  <label>Sustain: <input type="range" id="sustain" min="0.001" max="1" step="0.001" value="0.5"></label>
  <label>Release: <input type="range" id="release" min="0.001" max="2" step="0.001" value="0.5"></label>
</div>
  <div id="keyboard"></div>

  <script src="script.js"></script>
